<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YAVER Admin Takip Sistemi</title>

  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/luxon@3.5.0/build/global/luxon.min.js"></script>

  <style>
    :root{
      --bg:#090909;
      --panel:#121212;
      --panel-2:#1a1a1a;
      --border:#2a2a2a;
      --text:#f4f4f4;
      --muted:#b5b5b5;
      --yellow:#f5c400;
      --yellow-2:#ffd84d;
      --danger:#d45d5d;
      --danger-bg:#331818;
      --ok:#44c07a;
      --ok-bg:#123222;
      --warn:#d9a723;
      --warn-bg:#342a10;
      --blue:#56a3ff;
      --blue-bg:#132538;
      --purple:#bb7cff;
      --purple-bg:#2a1936;
      --shadow:0 12px 30px rgba(0,0,0,.35);
      --radius:18px;
    }

    *{box-sizing:border-box}
    html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:Inter,Segoe UI,Arial,"Noto Sans SC",sans-serif}
    body{min-height:100vh}

    .app{
      display:grid;
      grid-template-columns: 360px 1fr;
      gap:20px;
      padding:20px;
    }

    .sidebar, .main-panel, .panel, .admin-detail-card, .metric-card, .big-card, .admin-item{
      background:linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,.01));
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
    }

    .sidebar{
      padding:18px;
      position:sticky;
      top:20px;
      height:calc(100vh - 40px);
      overflow:auto;
    }

    .main{
      display:flex;
      flex-direction:column;
      gap:18px;
      min-width:0;
    }

    .hero{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:20px;
      padding:18px 22px;
      background:radial-gradient(circle at right top, rgba(245,196,0,.12), transparent 35%), linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,.01));
      border:1px solid var(--border);
      border-radius:24px;
      box-shadow:var(--shadow);
    }

    .logo-wrap{
      display:flex;
      align-items:center;
      gap:18px;
      min-width:0;
    }

    .logo-box{
      min-width:340px;
      height:110px;
      border-radius:22px;
      background:linear-gradient(180deg,#111,#0d0d0d);
      border:1px solid rgba(245,196,0,.25);
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:inset 0 0 30px rgba(245,196,0,.06);
      padding:14px 20px;
    }

    .logo-svg{
      width:100%;
      height:100%;
    }

    .hero-right{
      display:flex;
      align-items:center;
      justify-content:flex-end;
      gap:12px;
      flex-wrap:wrap;
    }

    .pill{
      border:1px solid rgba(245,196,0,.35);
      color:var(--yellow);
      background:rgba(245,196,0,.08);
      padding:10px 14px;
      border-radius:999px;
      font-size:14px;
      font-weight:700;
      text-align:center;
    }

    .section-title{
      margin:0 0 4px;
      font-size:20px;
      font-weight:800;
    }

    .section-sub{
      margin:0;
      font-size:13px;
      color:var(--muted);
      line-height:1.35;
    }

    .label{
      display:block;
      margin-bottom:10px;
    }

    .label .tr{
      display:block;
      font-size:15px;
      font-weight:800;
      margin-bottom:4px;
      color:var(--text);
    }

    .label .zh{
      display:block;
      font-size:12px;
      color:var(--muted);
    }

    input[type="text"],
    input[type="number"],
    input[type="time"],
    select,
    textarea{
      width:100%;
      background:var(--panel-2);
      color:var(--text);
      border:1px solid var(--border);
      border-radius:18px;
      padding:14px 16px;
      font-size:16px;
      outline:none;
      transition:.2s ease;
    }

    input:focus, select:focus, textarea:focus{
      border-color:rgba(245,196,0,.55);
      box-shadow:0 0 0 3px rgba(245,196,0,.10);
    }

    textarea{
      resize:vertical;
      min-height:120px;
      line-height:1.45;
    }

    .small{
      font-size:12px;
      color:var(--muted);
      line-height:1.45;
    }

    .file-input{
      width:100%;
      font-size:14px;
      color:var(--text);
    }

    .grid-3{
      display:grid;
      grid-template-columns:repeat(3, 1fr);
      gap:12px;
    }

    .grid-2{
      display:grid;
      grid-template-columns:repeat(2, 1fr);
      gap:16px;
    }

    .btn-row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:14px;
    }

    button{
      border:none;
      cursor:pointer;
      transition:.18s ease;
      font-weight:800;
      border-radius:18px;
      padding:14px 18px;
      font-size:16px;
    }

    .btn-primary{
      background:var(--yellow);
      color:#111;
    }

    .btn-primary:hover{background:var(--yellow-2)}
    .btn-secondary{
      background:transparent;
      color:var(--yellow);
      border:1px solid rgba(245,196,0,.45);
    }
    .btn-secondary:hover{
      background:rgba(245,196,0,.09);
    }
    .btn-danger{
      background:var(--danger-bg);
      color:#ffb8b8;
      border:1px solid rgba(212,93,93,.45);
    }

    .tabs{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .tab{
      padding:12px 18px;
      border-radius:999px;
      background:#222;
      color:#ddd;
      border:1px solid #333;
      font-size:15px;
      font-weight:800;
    }

    .tab.active{
      background:var(--yellow);
      color:#111;
      border-color:transparent;
    }

    .main-panel{
      padding:16px;
    }

    .layout{
      display:grid;
      grid-template-columns: 340px 1fr;
      gap:16px;
      min-height:560px;
    }

    .admin-list-card, .content-card{
      background:linear-gradient(180deg, rgba(255,255,255,.015), rgba(255,255,255,.008));
      border:1px solid var(--border);
      border-radius:22px;
      padding:14px;
      min-width:0;
    }

    .admin-list{
      display:flex;
      flex-direction:column;
      gap:10px;
      max-height:720px;
      overflow:auto;
      padding-right:4px;
    }

    .admin-item{
      padding:14px;
      cursor:pointer;
      transition:.15s ease;
      background:linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,.01));
    }

    .admin-item.active{
      border-color:rgba(245,196,0,.75);
      box-shadow:inset 0 0 0 1px rgba(245,196,0,.18);
      background:radial-gradient(circle at top right, rgba(245,196,0,.12), transparent 55%), linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,.01));
    }

    .admin-item h4{
      margin:0 0 8px;
      font-size:18px;
      line-height:1.2;
      word-break:break-word;
    }

    .admin-item .meta{
      font-size:13px;
      color:var(--muted);
      line-height:1.45;
      word-break:break-word;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      gap:6px;
      padding:7px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:800;
      margin-top:10px;
    }

    .badge.ok{background:var(--ok-bg);color:#8cf0b6;border:1px solid rgba(68,192,122,.35)}
    .badge.warn{background:var(--warn-bg);color:#ffd35d;border:1px solid rgba(217,167,35,.35)}
    .badge.danger{background:var(--danger-bg);color:#ffb0b0;border:1px solid rgba(212,93,93,.35)}
    .badge.blue{background:var(--blue-bg);color:#9cc7ff;border:1px solid rgba(86,163,255,.35)}
    .badge.purple{background:var(--purple-bg);color:#dbb6ff;border:1px solid rgba(187,124,255,.35)}

    .content-card{
      display:flex;
      flex-direction:column;
      gap:16px;
      min-width:0;
    }

    .admin-detail-card{
      padding:18px;
    }

    .admin-detail-top{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
      margin-bottom:14px;
      flex-wrap:wrap;
    }

    .admin-detail-top h3{
      margin:0 0 6px;
      font-size:26px;
      word-break:break-word;
    }

    .inline-meta{
      color:var(--muted);
      font-size:14px;
      line-height:1.5;
    }

    .weekly-grid{
      display:grid;
      grid-template-columns:repeat(7, 1fr);
      gap:10px;
      margin-top:10px;
    }

    .day-box{
      border:1px solid var(--border);
      border-radius:18px;
      padding:10px 8px;
      text-align:center;
      background:var(--panel-2);
    }

    .day-box input{
      width:18px;
      height:18px;
      accent-color:var(--yellow);
      margin-bottom:8px;
    }

    .day-box .tr{
      display:block;
      font-weight:800;
      margin-bottom:4px;
    }

    .day-box .zh{
      display:block;
      color:var(--muted);
      font-size:12px;
    }

    .metrics{
      display:grid;
      grid-template-columns:repeat(4, 1fr);
      gap:12px;
    }

    .metric-card{
      padding:16px;
      background:linear-gradient(180deg, rgba(255,255,255,.018), rgba(255,255,255,.008));
    }

    .metric-label{
      font-size:13px;
      color:var(--muted);
      margin-bottom:8px;
      line-height:1.4;
    }

    .metric-value{
      font-size:28px;
      font-weight:900;
      line-height:1.05;
      margin-bottom:6px;
      word-break:break-word;
    }

    .metric-note{
      font-size:12px;
      color:var(--muted);
      line-height:1.35;
    }

    .big-card{
      padding:16px;
      min-width:0;
      overflow:hidden;
    }

    .card-title{
      margin:0 0 4px;
      font-size:18px;
      font-weight:900;
    }

    .card-sub{
      margin:0 0 14px;
      color:var(--muted);
      font-size:13px;
    }

    .table-wrap{
      overflow:auto;
      border:1px solid var(--border);
      border-radius:18px;
    }

    table{
      width:100%;
      border-collapse:collapse;
      min-width:920px;
      background:#111;
    }

    thead th{
      position:sticky;
      top:0;
      z-index:1;
      background:#181818;
      color:#f7f7f7;
      font-size:13px;
      text-align:left;
      padding:12px 12px;
      border-bottom:1px solid var(--border);
      vertical-align:bottom;
      line-height:1.35;
    }

    thead th .zh{
      display:block;
      color:var(--muted);
      font-size:11px;
      font-weight:500;
      margin-top:4px;
    }

    tbody td{
      padding:12px 12px;
      border-bottom:1px solid #222;
      vertical-align:top;
      font-size:14px;
      line-height:1.45;
    }

    tbody tr:hover{
      background:#171717;
    }

    .status-chip{
      display:inline-block;
      padding:6px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:800;
      white-space:nowrap;
    }

    .status-green{background:var(--ok-bg);color:#8cf0b6;border:1px solid rgba(68,192,122,.35)}
    .status-yellow{background:var(--warn-bg);color:#ffd35d;border:1px solid rgba(217,167,35,.35)}
    .status-red{background:var(--danger-bg);color:#ffb0b0;border:1px solid rgba(212,93,93,.35)}
    .status-blue{background:var(--blue-bg);color:#9cc7ff;border:1px solid rgba(86,163,255,.35)}
    .status-purple{background:var(--purple-bg);color:#dbb6ff;border:1px solid rgba(187,124,255,.35)}
    .status-gray{background:#232323;color:#ddd;border:1px solid #3b3b3b}

    .empty{
      min-height:420px;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:30px;
      border:1px dashed #2e2e2e;
      border-radius:24px;
      color:var(--muted);
      font-size:18px;
      line-height:1.7;
    }

    .footer-note{
      text-align:center;
      color:var(--muted);
      font-size:12px;
      padding:6px 0 2px;
      line-height:1.4;
    }

    .hidden{display:none !important}

    @media (max-width: 1280px){
      .metrics{grid-template-columns:repeat(2,1fr)}
      .layout{grid-template-columns: 300px 1fr}
    }

    @media (max-width: 980px){
      .app{grid-template-columns:1fr}
      .sidebar{position:static;height:auto}
      .layout{grid-template-columns:1fr}
      .grid-3{grid-template-columns:1fr}
      .grid-2{grid-template-columns:1fr}
      .metrics{grid-template-columns:1fr}
      .weekly-grid{grid-template-columns:repeat(4, 1fr)}
      .logo-box{min-width:unset;width:100%;max-width:420px}
      .hero{flex-direction:column;align-items:flex-start}
    }

    @media (max-width: 640px){
      .weekly-grid{grid-template-columns:repeat(2, 1fr)}
      .app{padding:12px}
      .sidebar,.main-panel,.hero{border-radius:18px}
      .metric-value{font-size:24px}
      .admin-detail-top h3{font-size:22px}
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="panel">
        <h2 class="section-title">Veri Yükleme</h2>
        <p class="section-sub">上传数据</p>

        <div style="height:14px"></div>

        <label class="label">
          <span class="tr">Excel Dosyaları</span>
          <span class="zh">Excel 文件</span>
        </label>
        <input id="fileInput" class="file-input" type="file" accept=".xlsx,.xls" multiple />
        <div class="small" style="margin-top:8px">En fazla 30 dosya<br>最多 30 个文件</div>

        <div style="height:16px"></div>

        <div class="grid-3">
          <div>
            <label class="label">
              <span class="tr">Geç Kalma Toleransı (dk)</span>
              <span class="zh">迟到容差（分钟）</span>
            </label>
            <input id="lateTolerance" type="number" min="0" value="0" />
          </div>
          <div>
            <label class="label">
              <span class="tr">Erken Çıkış Toleransı (dk)</span>
              <span class="zh">提前下播容差（分钟）</span>
            </label>
            <input id="earlyTolerance" type="number" min="0" value="0" />
          </div>
          <div>
            <label class="label">
              <span class="tr">Kısa Kesinti Eşiği (dk)</span>
              <span class="zh">短暂中断阈值（分钟）</span>
            </label>
            <input id="shortGapThreshold" type="number" min="0" value="1" />
          </div>
        </div>

        <div class="btn-row">
          <button id="analyzeBtn" class="btn-primary">Analizi Başlat<br><span style="font-size:12px;font-weight:700">开始分析</span></button>
          <button id="clearBtn" class="btn-danger">Temizle<br><span style="font-size:12px;font-weight:700">清空</span></button>
        </div>

        <div style="height:16px"></div>

        <div class="panel" style="padding:14px;border-radius:18px;background:#12100a;border-color:rgba(245,196,0,.16)">
          <label class="label">
            <span class="tr">Yüklenen Adminler</span>
            <span class="zh">已上传管理员</span>
          </label>
          <div id="sidebarAdminSummary" class="small">Henüz dosya yok<br>暂无文件</div>
        </div>
      </div>
    </aside>

    <main class="main">
      <section class="hero">
        <div class="logo-wrap">
          <div class="logo-box">
            <svg class="logo-svg" viewBox="0 0 900 260" xmlns="http://www.w3.org/2000/svg" aria-label="YAVER Logo">
              <defs>
                <linearGradient id="yaverGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                  <stop offset="0%" stop-color="#f1c400"/>
                  <stop offset="50%" stop-color="#ffd84d"/>
                  <stop offset="100%" stop-color="#e7b800"/>
                </linearGradient>
                <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
                  <feGaussianBlur stdDeviation="6" result="blur"/>
                  <feMerge>
                    <feMergeNode in="blur"/>
                    <feMergeNode in="SourceGraphic"/>
                  </feMerge>
                </filter>
              </defs>

              <g filter="url(#softGlow)">
                <text x="26" y="150"
                      font-size="118"
                      font-weight="900"
                      font-family="Inter, Segoe UI, Arial, sans-serif"
                      fill="url(#yaverGrad)">YAVER</text>
              </g>

              <text x="430" y="102"
                    font-size="64"
                    font-weight="850"
                    font-family="Inter, Segoe UI, Arial, sans-serif"
                    fill="#f4f4f4">Admin Takip</text>
              <text x="430" y="172"
                    font-size="64"
                    font-weight="850"
                    font-family="Inter, Segoe UI, Arial, sans-serif"
                    fill="#f4f4f4">Sistemi</text>
              <text x="436" y="228"
                    font-size="36"
                    font-weight="700"
                    font-family="Noto Sans SC, Microsoft YaHei, Arial, sans-serif"
                    fill="#bdbdbd">管理员追踪系统</text>
            </svg>
          </div>
        </div>

        <div class="hero-right">
          <div class="pill">UTC → Türkiye Saati<br>UTC → 土耳其时间</div>
          <div class="pill">Çoklu Admin Analizi<br>多管理员分析</div>
        </div>
      </section>

      <div class="tabs">
        <button class="tab active" id="tabDetail">Admin Detayı<br><span style="font-size:11px;font-weight:700">管理员详情</span></button>
        <button class="tab" id="tabCompare">Karşılaştırma<br><span style="font-size:11px;font-weight:700">对比</span></button>
      </div>

      <section class="main-panel">
        <div id="detailView" class="layout">
          <div class="admin-list-card">
            <h3 class="card-title">Admin Listesi</h3>
            <p class="card-sub">管理员列表</p>
            <div id="adminList" class="admin-list"></div>
          </div>

          <div class="content-card">
            <div id="detailContent" class="empty">
              Henüz dosya yok<br>暂无文件
            </div>
          </div>
        </div>

        <div id="compareView" class="hidden">
          <div class="content-card">
            <div id="compareContent" class="empty">
              Karşılaştırma için analiz üret<br>请先生成分析
            </div>
          </div>
        </div>

        <div class="footer-note">
          YAVER Admin Takip Sistemi<br>
          管理员追踪系统
        </div>
      </section>
    </main>
  </div>

  <script>
    const { DateTime } = luxon;

    const appState = {
      files: [],
      selectedIndex: null,
      analysisGenerated: false,
      comparisonRows: []
    };

    const dayKeys = ['monday','tuesday','wednesday','thursday','friday','saturday','sunday'];
    const dayLabels = {
      monday:{tr:'Pzt', zh:'周一'},
      tuesday:{tr:'Sal', zh:'周二'},
      wednesday:{tr:'Çar', zh:'周三'},
      thursday:{tr:'Per', zh:'周四'},
      friday:{tr:'Cum', zh:'周五'},
      saturday:{tr:'Cmt', zh:'周六'},
      sunday:{tr:'Paz', zh:'周日'},
    };

    const fileInput = document.getElementById('fileInput');
    const analyzeBtn = document.getElementById('analyzeBtn');
    const clearBtn = document.getElementById('clearBtn');
    const adminListEl = document.getElementById('adminList');
    const detailContent = document.getElementById('detailContent');
    const compareContent = document.getElementById('compareContent');
    const sidebarAdminSummary = document.getElementById('sidebarAdminSummary');

    const tabDetail = document.getElementById('tabDetail');
    const tabCompare = document.getElementById('tabCompare');
    const detailView = document.getElementById('detailView');
    const compareView = document.getElementById('compareView');

    fileInput.addEventListener('change', handleFiles);
    analyzeBtn.addEventListener('click', analyzeAll);
    clearBtn.addEventListener('click', clearAll);

    tabDetail.addEventListener('click', () => switchTab('detail'));
    tabCompare.addEventListener('click', () => switchTab('compare'));

    function switchTab(tab){
      const isDetail = tab === 'detail';
      tabDetail.classList.toggle('active', isDetail);
      tabCompare.classList.toggle('active', !isDetail);
      detailView.classList.toggle('hidden', !isDetail);
      compareView.classList.toggle('hidden', isDetail);
    }

    function clearAll(){
      appState.files = [];
      appState.selectedIndex = null;
      appState.analysisGenerated = false;
      appState.comparisonRows = [];
      fileInput.value = '';
      renderAll();
    }

    function safeString(v){
      return v == null ? '' : String(v).trim();
    }

    function excelSerialToUTCDate(serial) {
      const utcDays = Math.floor(serial - 25569);
      const utcValue = utcDays * 86400;
      const fractionalDay = serial - Math.floor(serial) + 0.0000001;
      const totalSeconds = Math.floor(86400 * fractionalDay);
      const seconds = totalSeconds % 60;
      const totalMinutes = Math.floor(totalSeconds / 60);
      const minutes = totalMinutes % 60;
      const hours = Math.floor(totalMinutes / 60);
      const d = new Date(utcValue * 1000);
      d.setUTCHours(hours, minutes, seconds, 0);
      return d;
    }

    function parseUtcToTR(raw){
      if (raw == null || raw === '') return null;

      if (typeof raw === 'number' && isFinite(raw)) {
        const d = excelSerialToUTCDate(raw);
        return DateTime.fromJSDate(d, { zone: 'UTC' }).setZone('Europe/Istanbul');
      }

      const s = String(raw).trim();

      let dt = DateTime.fromFormat(s, 'MM/dd/yyyy HH:mm:ss', { zone: 'UTC' });
      if (!dt.isValid) dt = DateTime.fromFormat(s, 'M/d/yyyy H:mm:ss', { zone: 'UTC' });
      if (!dt.isValid) dt = DateTime.fromFormat(s, 'yyyy-MM-dd HH:mm:ss', { zone: 'UTC' });
      if (!dt.isValid) dt = DateTime.fromISO(s, { zone: 'UTC' });

      if (!dt.isValid) {
        const native = new Date(s);
        if (!isNaN(native.getTime())) {
          dt = DateTime.fromJSDate(native, { zone: 'UTC' });
        }
      }

      if (!dt || !dt.isValid) return null;
      return dt.setZone('Europe/Istanbul');
    }

    function parseRows(sheetJson){
      const normalized = [];
      for (const row of sheetJson) {
        const roomId = safeString(row['房间XID'] ?? row['房间ID'] ?? row['房间Xid'] ?? row['房间']);
        const adminId = safeString(row['用户XID'] ?? row['用户ID'] ?? row['用户Xid']);
        const up = row['上麦时间'];
        const down = row['下麦时间'];

        if (!roomId || !adminId || up == null || down == null || up === '' || down === '') continue;

        const startTR = parseUtcToTR(up);
        const endTR = parseUtcToTR(down);

        if (!startTR || !endTR || endTR <= startTR) continue;

        normalized.push({
          roomId,
          adminId,
          startTR,
          endTR,
          upRaw: safeString(up),
          downRaw: safeString(down)
        });
      }

      normalized.sort((a,b) => a.startTR.toMillis() - b.startTR.toMillis());
      return normalized;
    }

    function readFileAsArrayBuffer(file){
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = e => resolve(e.target.result);
        reader.onerror = reject;
        reader.readAsArrayBuffer(file);
      });
    }

    function buildTimeOptions(){
      const arr = [];
      for(let h=0; h<=24; h++){
        for(let m=0; m<60; m+=30){
          if(h === 24 && m > 0) continue;
          arr.push(`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`);
        }
      }
      return arr;
    }

    const timeOptions = buildTimeOptions();

    async function handleFiles(e){
      const files = Array.from(e.target.files || []);
      if (!files.length) return;
      if (files.length > 30) {
        alert('En fazla 30 dosya yüklenebilir.\n最多可上传 30 个文件。');
        fileInput.value = '';
        return;
      }

      const parsed = [];
      const warnings = [];

      for (const file of files) {
        try {
          const buffer = await readFileAsArrayBuffer(file);
          const workbook = XLSX.read(buffer, { type: 'array', cellDates: false });
          const sheetName = workbook.SheetNames[0];
          const ws = workbook.Sheets[sheetName];
          const json = XLSX.utils.sheet_to_json(ws, { defval: '' });

          const rawAdminIds = [...new Set(
            json
              .map(row => row['用户XID'] ?? row['用户ID'] ?? row['用户Xid'])
              .filter(v => v != null && String(v).trim() !== '')
              .map(v => String(v).trim())
          )];

          const rows = parseRows(json);

          let resolvedAdminId = '';
          if (rawAdminIds.length === 1) {
            resolvedAdminId = rawAdminIds[0];
          } else if (rawAdminIds.length > 1) {
            resolvedAdminId = rawAdminIds[0];
            warnings.push(`${file.name}: birden fazla Admin ID bulundu / 存在多个管理员ID`);
          } else {
            warnings.push(`${file.name}: Admin ID okunamadı / 无法读取管理员ID`);
          }

          const firstStart = rows.length ? rows[0].startTR : null;
          const lastEnd = rows.length ? rows[rows.length-1].endTR : null;

          parsed.push({
            fileName: file.name,
            adminName: '',
            adminId: resolvedAdminId,
            roomId: '',
            startTime: '22:00',
            endTime: '24:00',
            weeklySchedule: {
              monday: true,
              tuesday: true,
              wednesday: true,
              thursday: true,
              friday: true,
              saturday: false,
              sunday: false
            },
            leaveDatesText: '',
            substitutionText: '',
            rows,
            rawCount: json.length,
            firstStart,
            lastEnd,
            analysis: null,
            status: resolvedAdminId ? 'ready' : 'missing-id'
          });
        } catch (err) {
          warnings.push(`${file.name}: dosya okunamadı / 文件无法读取`);
        }
      }

      appState.files = parsed;
      appState.selectedIndex = parsed.length ? 0 : null;
      appState.analysisGenerated = false;
      appState.comparisonRows = [];
      renderAll();

      if (warnings.length) {
        alert(warnings.join('\n'));
      }
    }

    function parseTimeToMinutes(t){
      const [h, m] = t.split(':').map(Number);
      return h * 60 + m;
    }

    function buildScheduleWindow(baseDateISO, startTime, endTime){
      const [y,m,d] = baseDateISO.split('-').map(Number);
      const startMin = parseTimeToMinutes(startTime);
      const endMin = parseTimeToMinutes(endTime);

      const start = DateTime.fromObject(
        { year:y, month:m, day:d, hour:Math.floor(startMin/60), minute:startMin%60 },
        { zone:'Europe/Istanbul' }
      );

      let end;
      if (endTime === '24:00') {
        end = start.startOf('day').plus({ days:1 });
      } else {
        end = DateTime.fromObject(
          { year:y, month:m, day:d, hour:Math.floor(endMin/60), minute:endMin%60 },
          { zone:'Europe/Istanbul' }
        );
        if (end <= start) end = end.plus({ days:1 });
      }

      return { start, end };
    }

    function getScheduleDayKey(dt){
      switch(dt.weekday){
        case 1: return 'monday';
        case 2: return 'tuesday';
        case 3: return 'wednesday';
        case 4: return 'thursday';
        case 5: return 'friday';
        case 6: return 'saturday';
        case 7: return 'sunday';
      }
    }

    function parseDateLines(text){
      return new Set(
        text.split('\n')
          .map(s => s.trim())
          .filter(Boolean)
      );
    }

    function parseSubstitutions(text){
      const map = new Map();
      text.split('\n').map(s => s.trim()).filter(Boolean).forEach(line => {
        const parts = line.split('|').map(x => x.trim());
        if (parts.length >= 2) {
          map.set(parts[0], parts[1]);
        }
      });
      return map;
    }

    function overlapMinutes(start1, end1, start2, end2){
      const s = Math.max(start1.toMillis(), start2.toMillis());
      const e = Math.min(end1.toMillis(), end2.toMillis());
      return Math.max(0, Math.round((e - s) / 60000));
    }

    function clipInterval(start1, end1, start2, end2){
      const s = Math.max(start1.toMillis(), start2.toMillis());
      const e = Math.min(end1.toMillis(), end2.toMillis());
      if (e <= s) return null;
      return {
        start: DateTime.fromMillis(s, { zone:'Europe/Istanbul' }),
        end: DateTime.fromMillis(e, { zone:'Europe/Istanbul' })
      };
    }

    function mergeIntervals(intervals){
      if (!intervals.length) return [];
      const sorted = [...intervals].sort((a,b) => a.start.toMillis() - b.start.toMillis());
      const merged = [sorted[0]];
      for (let i=1; i<sorted.length; i++){
        const cur = sorted[i];
        const last = merged[merged.length - 1];
        if (cur.start <= last.end) {
          if (cur.end > last.end) last.end = cur.end;
        } else {
          merged.push({ start: cur.start, end: cur.end });
        }
      }
      return merged;
    }

    function getStatusClass(status){
      switch(status){
        case 'Sorunsuz':
        case 'Temsil ile tamamlandı':
          return 'status-green';
        case 'Geç başladı':
        case 'Erken çıktı':
        case 'Geç başladı + Erken çıktı':
        case 'Kesinti var':
        case 'Başka odada aktif':
          return 'status-yellow';
        case 'Hiç gelmedi':
        case 'Yayına gelmedi, başka odada aktif':
          return 'status-red';
        case 'İzinli':
          return 'status-blue';
        case 'Yayın değişikliği':
          return 'status-purple';
        case 'Plan dışı':
          return 'status-gray';
        default:
          return 'status-gray';
      }
    }

    function generateAnalysisForFile(f, globalConfig){
      const leaveDates = parseDateLines(f.leaveDatesText || '');
      const substitutionMap = parseSubstitutions(f.substitutionText || '');
      const targetRoomId = safeString(f.roomId);
      const baseAdminId = safeString(f.adminId);

      if (!baseAdminId || !targetRoomId) {
        return {
          summary: null,
          dailyRows: [],
          missButOtherRooms: [],
          monthlyRows: [],
          compareRow: null,
          error: 'Admin ID veya oda ID eksik'
        };
      }

      const relevantRows = f.rows.filter(r => r.adminId === baseAdminId || [...substitutionMap.values()].includes(r.adminId));

      if (!relevantRows.length) {
        return {
          summary: {
            planned: 0, onTimeStart: 0, late: 0, early: 0, absent: 0, leave: leaveDates.size, substitution: substitutionMap.size,
            totalGap: 0, totalOtherRoom: 0
          },
          dailyRows: [],
          missButOtherRooms: [],
          monthlyRows: [],
          compareRow: null,
          error: null
        };
      }

      const minDate = relevantRows[0].startTR.startOf('day');
      const maxDate = relevantRows[relevantRows.length - 1].endTR.startOf('day');

      const dailyRows = [];
      const missButOtherRooms = [];

      for (let cur = minDate; cur <= maxDate; cur = cur.plus({ days:1 })) {
        const iso = cur.toISODate();
        const dayKey = getScheduleDayKey(cur);

        if (!f.weeklySchedule[dayKey]) {
          dailyRows.push({
            date: iso,
            dayTR: cur.setLocale('tr').toFormat('cccc'),
            status: 'Plan dışı',
            firstEntry: '-',
            lastExit: '-',
            lateMin: 0,
            earlyMin: 0,
            gapCount: 0,
            totalGapMin: 0,
            otherRoomMin: 0,
            otherRoomsText: '-',
            note: '-'
          });
          continue;
        }

        if (leaveDates.has(iso)) {
          dailyRows.push({
            date: iso,
            dayTR: cur.setLocale('tr').toFormat('cccc'),
            status: 'İzinli',
            firstEntry: '-',
            lastExit: '-',
            lateMin: 0,
            earlyMin: 0,
            gapCount: 0,
            totalGapMin: 0,
            otherRoomMin: 0,
            otherRoomsText: '-',
            note: '-'
          });
          continue;
        }

        const substituteAdminId = substitutionMap.get(iso) || '';
        const activeAdminId = substituteAdminId || baseAdminId;
        const isSubstitution = !!substituteAdminId;
        const schedule = buildScheduleWindow(iso, f.startTime, f.endTime);

        const activeRows = f.rows.filter(r => r.adminId === activeAdminId);

        const selfRoomIntervals = activeRows
          .filter(r => r.roomId === targetRoomId)
          .map(r => clipInterval(r.startTR, r.endTR, schedule.start, schedule.end))
          .filter(Boolean);

        const otherRoomIntervalsRaw = activeRows
          .filter(r => r.roomId !== targetRoomId)
          .map(r => {
            const clipped = clipInterval(r.startTR, r.endTR, schedule.start, schedule.end);
            return clipped ? { ...clipped, roomId: r.roomId } : null;
          })
          .filter(Boolean);

        const mergedSelf = mergeIntervals(selfRoomIntervals);
        const totalSelfMinutes = mergedSelf.reduce((sum, it) => sum + Math.round((it.end.toMillis() - it.start.toMillis()) / 60000), 0);

        const firstEntry = mergedSelf.length ? mergedSelf[0].start : null;
        const lastExit = mergedSelf.length ? mergedSelf[mergedSelf.length-1].end : null;

        const otherRoomMap = new Map();
        let totalOtherRoomMin = 0;
        for (const item of otherRoomIntervalsRaw) {
          const mins = Math.round((item.end.toMillis() - item.start.toMillis()) / 60000);
          totalOtherRoomMin += mins;
          otherRoomMap.set(item.roomId, (otherRoomMap.get(item.roomId) || 0) + mins);
        }

        const otherRoomsText = [...otherRoomMap.entries()]
          .map(([room, min]) => `${room}: ${min} dk`)
          .join(', ') || '-';

        let gapCount = 0;
        let totalGapMin = 0;

        if (mergedSelf.length > 0) {
          if (firstEntry > schedule.start) {
            const mins = Math.round((firstEntry.toMillis() - schedule.start.toMillis()) / 60000);
            totalGapMin += mins;
            if (mins >= globalConfig.shortGapThreshold) gapCount++;
          }

          for (let i=0; i<mergedSelf.length-1; i++) {
            const gap = Math.round((mergedSelf[i+1].start.toMillis() - mergedSelf[i].end.toMillis()) / 60000);
            if (gap > 0) {
              totalGapMin += gap;
              if (gap >= globalConfig.shortGapThreshold) gapCount++;
            }
          }

          if (lastExit < schedule.end) {
            const mins = Math.round((schedule.end.toMillis() - lastExit.toMillis()) / 60000);
            totalGapMin += mins;
            if (mins >= globalConfig.shortGapThreshold) gapCount++;
          }
        }

        let lateMin = 0;
        let earlyMin = 0;
        if (firstEntry) lateMin = Math.max(0, Math.round((firstEntry.toMillis() - schedule.start.toMillis()) / 60000));
        if (lastExit) earlyMin = Math.max(0, Math.round((schedule.end.toMillis() - lastExit.toMillis()) / 60000));

        let status = 'Sorunsuz';
        let note = '-';

        if (!mergedSelf.length) {
          if (totalOtherRoomMin > 0) {
            status = 'Yayına gelmedi, başka odada aktif';
            missButOtherRooms.push({
              date: iso,
              adminName: f.adminName || f.fileName,
              adminId: baseAdminId,
              roomId: targetRoomId,
              details: [...otherRoomMap.entries()].map(([room, min]) => ({ room, min })),
              total: totalOtherRoomMin
            });
          } else {
            status = 'Hiç gelmedi';
          }
        } else {
          const lateFlag = lateMin > globalConfig.lateTolerance;
          const earlyFlag = earlyMin > globalConfig.earlyTolerance;
          const gapFlag = gapCount > 0;
          const otherFlag = totalOtherRoomMin > 0;

          if (lateFlag && earlyFlag) status = 'Geç başladı + Erken çıktı';
          else if (lateFlag) status = 'Geç başladı';
          else if (earlyFlag) status = 'Erken çıktı';
          else if (gapFlag) status = 'Kesinti var';
          else if (otherFlag) status = 'Başka odada aktif';
          else status = 'Sorunsuz';

          if (isSubstitution && status === 'Sorunsuz') status = 'Temsil ile tamamlandı';
        }

        if (isSubstitution && note === '-') {
          note = `Temsilci Admin ID: ${substituteAdminId}`;
        }

        dailyRows.push({
          date: iso,
          dayTR: cur.setLocale('tr').toFormat('cccc'),
          status,
          firstEntry: firstEntry ? firstEntry.toFormat('HH:mm') : '-',
          lastExit: lastExit ? lastExit.toFormat('HH:mm') : '-',
          lateMin,
          earlyMin,
          gapCount,
          totalGapMin,
          otherRoomMin: totalOtherRoomMin,
          otherRoomsText,
          note
        });
      }

      const plannedRows = dailyRows.filter(r => !['Plan dışı','İzinli'].includes(r.status));
      const summary = {
        planned: dailyRows.filter(r => r.status !== 'Plan dışı').length,
        onTimeStart: dailyRows.filter(r => r.status === 'Sorunsuz' || r.status === 'Temsil ile tamamlandı').length,
        late: dailyRows.filter(r => ['Geç başladı','Geç başladı + Erken çıktı'].includes(r.status)).length,
        early: dailyRows.filter(r => ['Erken çıktı','Geç başladı + Erken çıktı'].includes(r.status)).length,
        absent: dailyRows.filter(r => ['Hiç gelmedi','Yayına gelmedi, başka odada aktif'].includes(r.status)).length,
        leave: dailyRows.filter(r => r.status === 'İzinli').length,
        substitution: dailyRows.filter(r => r.note.startsWith('Temsilci')).length,
        totalGap: dailyRows.reduce((sum, r) => sum + r.totalGapMin, 0),
        totalOtherRoom: dailyRows.reduce((sum, r) => sum + r.otherRoomMin, 0)
      };

      const monthMap = new Map();
      dailyRows.forEach(r => {
        const key = r.date.slice(0,7);
        if (!monthMap.has(key)) {
          monthMap.set(key, {
            month:key, planned:0, leave:0, substitution:0, late:0, early:0, absent:0, gap:0, other:0
          });
        }
        const m = monthMap.get(key);
        if (r.status !== 'Plan dışı') m.planned++;
        if (r.status === 'İzinli') m.leave++;
        if (r.note.startsWith('Temsilci')) m.substitution++;
        if (['Geç başladı','Geç başladı + Erken çıktı'].includes(r.status)) m.late++;
        if (['Erken çıktı','Geç başladı + Erken çıktı'].includes(r.status)) m.early++;
        if (['Hiç gelmedi','Yayına gelmedi, başka odada aktif'].includes(r.status)) m.absent++;
        m.gap += r.totalGapMin;
        m.other += r.otherRoomMin;
      });

      const monthlyRows = [...monthMap.values()];
      const validOperationalDays = dailyRows.filter(r => !['Plan dışı','İzinli'].includes(r.status)).length || 1;

      const compareRow = {
        adminName: f.adminName || f.fileName,
        adminId: baseAdminId,
        roomId: targetRoomId,
        planned: validOperationalDays,
        late: summary.late,
        early: summary.early,
        absent: summary.absent,
        totalGap: summary.totalGap,
        totalOther: summary.totalOtherRoom,
        wrongRoomAbsentDays: missButOtherRooms.length,
        onTimeRate: Math.round(((validOperationalDays - summary.late - summary.absent) / validOperationalDays) * 100)
      };

      return {
        summary,
        dailyRows,
        missButOtherRooms,
        monthlyRows,
        compareRow,
        error: null
      };
    }

    function analyzeAll(){
      if (!appState.files.length) {
        alert('Önce dosya yükle.\n请先上传文件。');
        return;
      }

      const globalConfig = {
        lateTolerance: Number(document.getElementById('lateTolerance').value || 0),
        earlyTolerance: Number(document.getElementById('earlyTolerance').value || 0),
        shortGapThreshold: Number(document.getElementById('shortGapThreshold').value || 1)
      };

      const compareRows = [];

      for (const f of appState.files) {
        f.analysis = generateAnalysisForFile(f, globalConfig);
        if (f.analysis.compareRow) compareRows.push(f.analysis.compareRow);
      }

      appState.comparisonRows = compareRows;
      appState.analysisGenerated = true;
      renderAll();
      switchTab('detail');
    }

    function renderAnalysisSection(f){
      const a = f.analysis;
      if (a.error) {
        return `<div class="empty" style="min-height:240px">${escapeHtml(a.error)}</div>`;
      }

      return `
        <div class="metrics">
          <div class="metric-card">
            <div class="metric-label">Toplam Planlı Gün<br>计划天数</div>
            <div class="metric-value">${a.summary.planned}</div>
            <div class="metric-note">İzinli hariç operasyon günleri dahil görünür</div>
          </div>
          <div class="metric-card">
            <div class="metric-label">Geç Kalma<br>迟到次数</div>
            <div class="metric-value">${a.summary.late}</div>
            <div class="metric-note">Tolerans üstü geç başlangıçlar</div>
          </div>
          <div class="metric-card">
            <div class="metric-label">Hiç Gelmeme<br>未到场次数</div>
            <div class="metric-value">${a.summary.absent}</div>
            <div class="metric-note">İzinli ve plan dışı hariç</div>
          </div>
          <div class="metric-card">
            <div class="metric-label">Başka Oda Süresi<br>其他房间时长</div>
            <div class="metric-value">${a.summary.totalOtherRoom} dk</div>
            <div class="metric-note">Yayın penceresi içinde</div>
          </div>
        </div>

        <div class="big-card">
          <h3 class="card-title">Yayına Gelmediği Halde Başka Odada Aktif Olduğu Günler</h3>
          <p class="card-sub">未到自己直播间但在其他房间上麦的日期</p>
          ${renderMissOtherRoomsTable(a.missButOtherRooms)}
        </div>

        <div class="big-card">
          <h3 class="card-title">Aylık Özet</h3>
          <p class="card-sub">月度汇总</p>
          ${renderMonthlyTable(a.monthlyRows)}
        </div>

        <div class="big-card">
          <h3 class="card-title">Günlük Detay</h3>
          <p class="card-sub">每日详细记录</p>
          ${renderDailyTable(a.dailyRows)}
        </div>
      `;
    }

    function renderMissOtherRoomsTable(rows){
      if (!rows.length) {
        return '<div class="empty" style="min-height:180px">Kayıt yok<br>无记录</div>';
      }
      return `
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Tarih<span class="zh">日期</span></th>
                <th>Admin<span class="zh">管理员</span></th>
                <th>Beklenen Oda<span class="zh">应在房间</span></th>
                <th>Başka Odalar<span class="zh">其他房间</span></th>
                <th>Toplam Dakika<span class="zh">总分钟</span></th>
              </tr>
            </thead>
            <tbody>
              ${rows.map(r => `
                <tr>
                  <td>${escapeHtml(r.date)}</td>
                  <td>${escapeHtml(r.adminName)}<br>ID: ${escapeHtml(r.adminId)}</td>
                  <td>${escapeHtml(r.roomId)}</td>
                  <td>${r.details.map(d => `${escapeHtml(d.room)}: ${d.min} dk`).join('<br>')}</td>
                  <td>${r.total}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      `;
    }

    function renderMonthlyTable(rows){
      if (!rows.length) {
        return '<div class="empty" style="min-height:180px">Aylık veri yok<br>无月度数据</div>';
      }
      return `
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Ay<span class="zh">月份</span></th>
                <th>Planlı Gün<span class="zh">计划天数</span></th>
                <th>İzinli<span class="zh">请假</span></th>
                <th>Temsil<span class="zh">代播</span></th>
                <th>Geç Kalma<span class="zh">迟到</span></th>
                <th>Erken Çıkış<span class="zh">提前下播</span></th>
                <th>Gelmeme<span class="zh">缺席</span></th>
                <th>Kesinti dk<span class="zh">中断分钟</span></th>
                <th>Başka Oda dk<span class="zh">其他房间分钟</span></th>
              </tr>
            </thead>
            <tbody>
              ${rows.map(r => `
                <tr>
                  <td>${escapeHtml(r.month)}</td>
                  <td>${r.planned}</td>
                  <td>${r.leave}</td>
                  <td>${r.substitution}</td>
                  <td>${r.late}</td>
                  <td>${r.early}</td>
                  <td>${r.absent}</td>
                  <td>${r.gap}</td>
                  <td>${r.other}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      `;
    }

    function renderDailyTable(rows){
      if (!rows.length) {
        return '<div class="empty" style="min-height:180px">Günlük veri yok<br>无每日数据</div>';
      }
      return `
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Tarih<span class="zh">日期</span></th>
                <th>Gün<span class="zh">星期</span></th>
                <th>Durum<span class="zh">状态</span></th>
                <th>İlk Giriş<span class="zh">首次上麦</span></th>
                <th>Son Çıkış<span class="zh">最后下麦</span></th>
                <th>Geç dk<span class="zh">迟到分钟</span></th>
                <th>Erken dk<span class="zh">提前分钟</span></th>
                <th>Kesinti<span class="zh">中断次数</span></th>
                <th>Kesinti dk<span class="zh">中断分钟</span></th>
                <th>Başka Oda dk<span class="zh">其他房间分钟</span></th>
                <th>Başka Odalar<span class="zh">其他房间</span></th>
                <th>Not<span class="zh">备注</span></th>
              </tr>
            </thead>
            <tbody>
              ${rows.map(r => `
                <tr>
                  <td>${escapeHtml(r.date)}</td>
                  <td>${escapeHtml(r.dayTR)}</td>
                  <td><span class="status-chip ${getStatusClass(r.status)}">${escapeHtml(r.status)}</span></td>
                  <td>${escapeHtml(r.firstEntry)}</td>
                  <td>${escapeHtml(r.lastExit)}</td>
                  <td>${r.lateMin}</td>
                  <td>${r.earlyMin}</td>
                  <td>${r.gapCount}</td>
                  <td>${r.totalGapMin}</td>
                  <td>${r.otherRoomMin}</td>
                  <td>${escapeHtml(r.otherRoomsText)}</td>
                  <td>${escapeHtml(r.note)}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      `;
    }

    function renderComparison(){
      if (!appState.analysisGenerated || !appState.comparisonRows.length) {
        compareContent.className = 'empty';
        compareContent.innerHTML = 'Karşılaştırma için analiz üret<br>请先生成分析';
        return;
      }

      compareContent.className = '';
      compareContent.innerHTML = `
        <div class="big-card">
          <h3 class="card-title">Admin Karşılaştırma Tablosu</h3>
          <p class="card-sub">管理员对比表</p>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Admin<span class="zh">管理员</span></th>
                  <th>ID<span class="zh">编号</span></th>
                  <th>Oda<span class="zh">房间</span></th>
                  <th>Planlı Gün<span class="zh">计划天数</span></th>
                  <th>Geç<span class="zh">迟到</span></th>
                  <th>Erken<span class="zh">提前下播</span></th>
                  <th>Gelmeme<span class="zh">缺席</span></th>
                  <th>Kesinti dk<span class="zh">中断分钟</span></th>
                  <th>Başka Oda dk<span class="zh">其他房间分钟</span></th>
                  <th>Kendi Yayınına Gelmeyip Başka Odada Olduğu Gün<span class="zh">未到自己直播间但在其他房间的天数</span></th>
                  <th>Zamanında Başlama Oranı<span class="zh">准时率</span></th>
                </tr>
              </thead>
              <tbody>
                ${appState.comparisonRows
                  .sort((a,b) => b.onTimeRate - a.onTimeRate)
                  .map(r => `
                    <tr>
                      <td>${escapeHtml(r.adminName)}</td>
                      <td>${escapeHtml(r.adminId)}</td>
                      <td>${escapeHtml(r.roomId)}</td>
                      <td>${r.planned}</td>
                      <td>${r.late}</td>
                      <td>${r.early}</td>
                      <td>${r.absent}</td>
                      <td>${r.totalGap}</td>
                      <td>${r.totalOther}</td>
                      <td>${r.wrongRoomAbsentDays}</td>
                      <td>${r.onTimeRate}%</td>
                    </tr>
                  `).join('')}
              </tbody>
            </table>
          </div>
        </div>
      `;
    }

    function escapeHtml(str){
      return String(str ?? '')
        .replaceAll('&','&amp;')
        .replaceAll('<','&lt;')
        .replaceAll('>','&gt;')
        .replaceAll('"','&quot;')
        .replaceAll("'",'&#39;');
    }

    function escapeAttr(str){
      return escapeHtml(str).replaceAll('\n', '&#10;');
    }

    renderAll();
  </script>
</body>
